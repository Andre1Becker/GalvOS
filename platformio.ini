; PlatformIO Project Configuration
; Target: galvOS - a OEM RGB Laser Replacement Mainboard
; Author: Andre

[env:esp32-s3-devkitc-1]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino

; --- N16R8 variant: 16 MB Flash + 8 MB PSRAM ---
board_build.flash_size = 16MB
board_build.psram_type = octal
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=3
    -D LASER_FW_VERSION=\"5.64.2\"
    -D GALVO_SAMPLE_RATE_HZ=30000
    -D DEFAULT_DMX_UNIVERSE=0
    -D DEFAULT_DMX_ADDRESS=1
    ; Async-Server-Flags
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
    -D CONFIG_ASYNC_TCP_USE_WDT=0

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600
upload_flags = --after=no_reset

; --- Combined flash: firmware + LittleFS in one step ---
; Usage:  pio run --target upload_all
extra_scripts =
    pre:scripts/upload_all.py
    pre:scripts/gzip_assets.py

lib_deps =
    ArduinoOTA
    SD
    ; --- HTTP + WebSocket ---
    esp32async/AsyncTCP@^3.4.10
    esp32async/ESPAsyncWebServer@^3.11.1
    ; --- DMX + Art-Net ---
    someweisguy/esp_dmx@^4.1.0
    https://github.com/rstephan/ArtnetWifi.git
    ; --- JSON ---
    bblanchon/ArduinoJson@^7.0.4
    ; --- Temperature (DS18B20) ---
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

; Build & upload commands:
;   pio run                          -> build firmware
;   pio run --target upload          -> flash firmware only
;   pio run --target uploadfs        -> flash LittleFS only (HTML/CSS/JS from data/)
;   pio run --target buildfs         -> build LittleFS image (without flashing)
;   pio run --target upload_all      -> *** RECOMMENDED: build + flash both ***
;   pio device monitor               -> serial console